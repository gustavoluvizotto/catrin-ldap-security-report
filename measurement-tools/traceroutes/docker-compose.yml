name: traceroutes

services:
    mtr-runner:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: mtr-runner
        volumes:
            - ./mtr_results:/app/results  # Mounts local ./results to /app/results in container
        cap_add:
            - NET_RAW

    measurement-server:
        build:
            context: .
            dockerfile: Dockerfile.server
        container_name: measurement-server
        ports:
            - "127.0.0.1:5002:5002"   # internal only — reachable from the host's flasksite
        volumes:
            - ./mtr_results:/app/results
        cap_add:
            - NET_RAW                  # mtr runs inside this container

    mtr-reader:
        build:
            context: .
            dockerfile: Dockerfile.reader
        container_name: mtr-reader
        volumes:
            - ./mtr_results:/app/results:ro
        environment:
            - MTR_RESULTS_DIR=/app/results
        profiles:
            - reader
